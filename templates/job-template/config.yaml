topic: my-project-1

requirements:
  require_citations: true
  require_claim_register: true
  require_disagreement_log: true
  separate_facts_from_inference: true
  # When true, research facts/inferences citing external evidence must carry a
  # quoted excerpt on an evidence support link (validation error instead of warning).
  # require_evidence_excerpts: true

source_policy:
  preferred:
    - official documentation
    - academic papers
    - primary-source reporting
  allowed_with_caution:
    - reputable trade publications
    - analyst commentary
  disallowed:
    - anonymous blogs
    - uncited forum posts

freshness:
  max_days: 365

novelty:
  # Consider solutions announced but not yet released when they could fit the goal.
  include_announced: true
  # How far back a release still counts as "recent" for the horizon-scan research pass.
  horizon_months: 12

workflow:
  preserve_disagreements: true
  require_judge_synthesis: true
  claim_extraction_required: true

# Optional publication quality gates. Uncomment to enable.
# quality_policy:
#   one_sided_source_selection: true
#   disfavored_recommendation_support: true
#   evidence_quality_mismatch: true
#   disagreement_collapse: true
