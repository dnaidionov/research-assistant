topic: my-project-1

requirements:
  require_citations: true
  require_claim_register: true
  require_disagreement_log: true
  separate_facts_from_inference: true
  # When true, research facts/inferences citing external evidence must carry a
  # quoted excerpt on an evidence support link (validation error instead of warning).
  # require_evidence_excerpts: true
  # When true, a judge output that leaves any critique disagreement id (DIS-###)
  # unaddressed fails validation instead of warning.
  # require_disagreement_coverage: true

# Enforced during validation and publication: entries are matched (case-insensitive)
# against each source's type and authority. "disallowed" matches block claims that
# cite the source at publication; "allowed_with_caution" matches carry warnings;
# "preferred" matches are annotated. Matches only ever escalate the intrinsic
# policy outcome, never relax it.
source_policy:
  preferred:
    - official documentation
    - academic papers
    - primary-source reporting
  allowed_with_caution:
    - reputable trade publications
    - analyst commentary
  disallowed:
    - anonymous blogs
    - uncited forum posts

freshness:
  max_days: 365

novelty:
  # Consider solutions announced but not yet released when they could fit the goal.
  include_announced: true
  # How far back a release still counts as "recent" for the horizon-scan research pass.
  horizon_months: 12

workflow:
  preserve_disagreements: true
  require_judge_synthesis: true
  claim_extraction_required: true
  # Preferred way to pin stage-provider and stage-model selection: define named
  # providers and map every execution stage to one. The optional final-report
  # entry routes the LLM final-report synthesis step (the last step of every
  # run); when omitted, it reuses the judge stage's provider and model.
  # execution:
  #   providers:
  #     codex_primary:
  #       adapter: codex
  #     gemini_secondary:
  #       adapter: gemini
  #       model: pro
  #   stage_providers:
  #     intake: codex_primary
  #     research-a: codex_primary
  #     research-b: gemini_secondary
  #     critique-a-on-b: codex_primary
  #     critique-b-on-a: gemini_secondary
  #     judge: gemini_secondary
  #     final-report: gemini_secondary

# Optional publication quality gates. Uncomment to enable.
# quality_policy:
#   one_sided_source_selection: true
#   disfavored_recommendation_support: true
#   evidence_quality_mismatch: true
